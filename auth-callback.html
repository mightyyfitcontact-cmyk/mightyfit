<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MightyFit — Accediendo...</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#04080f;--accent:#2d7de8;--accent-bright:#4d9fff;--text:#e8f0ff;--muted:#5a7090;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 120% 40% at 50% -5%,rgba(45,125,232,0.14) 0%,transparent 60%);pointer-events:none;}
  .logo{font-family:"Bebas Neue",sans-serif;font-size:28px;letter-spacing:6px;color:#fff;margin-bottom:32px;}
  .logo span{color:var(--accent-bright);}
  .loader{width:48px;height:48px;border:3px solid rgba(45,125,232,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 20px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .status{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
  .error-box{display:none;background:rgba(255,80,80,0.08);border:1px solid rgba(255,80,80,0.2);border-radius:12px;padding:16px 20px;text-align:center;max-width:360px;}
  .error-box p{font-family:"Space Mono",monospace;font-size:10px;color:#ff8080;line-height:1.6;}
  .error-box a{color:var(--accent-bright);text-decoration:none;display:block;margin-top:12px;}
</style>
</head>
<body>
<div class="logo">MIGHTY<span>FIT</span></div>
<div class="loader" id="loader"></div>
<div class="status" id="status">Verificando acceso...</div>
<div class="error-box" id="errorBox">
  <p id="errorMsg">Error al verificar tu acceso.</p>
  <a href="/login">← Volver al login</a>
</div>

<script>
const SUPABASE_URL = "https://cbxqdeeawyfmqemiepeb.supabase.co";
const SUPABASE_KEY = "sb_publishable_ZZUW0bqKFuwzO-4K19Vnow_-CQWSSC0";

function showError(msg) {
  document.getElementById("loader").style.display = "none";
  document.getElementById("status").style.display = "none";
  document.getElementById("errorMsg").textContent = msg;
  document.getElementById("errorBox").style.display = "block";
}

async function handleCallback() {
  // Get tokens from URL hash (Supabase sends them here after OAuth)
  var hash = window.location.hash.substring(1);
  var params = new URLSearchParams(hash);
  var accessToken = params.get("access_token");
  var refreshToken = params.get("refresh_token");

  if (!accessToken) {
    // Try query params too
    var qParams = new URLSearchParams(window.location.search);
    var code = qParams.get("code");
    if (code) {
      // Exchange code for session
      try {
        document.getElementById("status").textContent = "Autenticando con Google...";
        var res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=pkce", {
          method: "POST",
          headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY },
          body: JSON.stringify({ auth_code: code })
        });
        var data = await res.json();
        if (data.access_token) {
          accessToken = data.access_token;
          refreshToken = data.refresh_token;
        } else {
          showError("No se pudo completar la autenticación. Intenta de nuevo.");
          return;
        }
      } catch(e) {
        showError("Error de conexión. Intenta de nuevo.");
        return;
      }
    } else {
      showError("No se recibió token de acceso. Intenta iniciar sesión de nuevo.");
      return;
    }
  }

  try {
    document.getElementById("status").textContent = "Verificando tu plan...";

    // Get user info from Supabase Auth
    var userRes = await fetch(SUPABASE_URL + "/auth/v1/user", {
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + accessToken }
    });
    var userData = await userRes.json();
    var email = userData.email;

    if (!email) {
      showError("No se pudo obtener tu email. Intenta de nuevo.");
      return;
    }

    // Check if user has a paid plan in our users table
    var planRes = await fetch(
      SUPABASE_URL + "/rest/v1/users?email=eq." + encodeURIComponent(email) + "&select=email,plan,rutinas_usadas,rutinas_limite,activo",
      { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + accessToken } }
    );
    var users = await planRes.json();

    if (!users || users.length === 0) {
      showError("No encontramos ningún plan activo para " + email + ". Asegúrate de comprar con el mismo email de Google.");
      return;
    }
    if (!users[0].activo) {
      showError("Tu cuenta no está activa. Contacta con soporte.");
      return;
    }

    // Save session
    localStorage.setItem("mf_session", JSON.stringify({
      access_token: accessToken,
      refresh_token: refreshToken,
      email: email,
      plan: users[0].plan
    }));

    document.getElementById("status").textContent = "¡Acceso confirmado! Entrando...";
    setTimeout(function() { window.location.href = "/generador"; }, 800);

  } catch(err) {
    showError("Error al verificar tu acceso: " + err.message);
  }
}

window.addEventListener("load", handleCallback);
</script>
</body>
</html>
